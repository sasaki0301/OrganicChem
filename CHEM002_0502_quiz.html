<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chapter 5 – Lesson 2 Quiz: Cis–Trans and E–Z Isomerism</title>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e8f9f1, #f7faff);
    margin: 0;
    padding: 40px 20px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .quiz-container {
    background: #ffffff;
    border-radius: 18px;
    padding: 40px 50px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    width: 95%;
    max-width: 850px;
    text-align: center;
  }

  h2 {
    color: #136f63;
    margin-bottom: 25px;
    font-size: 1.8em;
  }

  .progress-wrapper {
    background: #e9f5ef;
    border-radius: 8px;
    height: 14px;
    width: 100%;
    margin-bottom: 25px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, #136f63, #2b7de9);
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    text-align: right;
    font-size: 0.95em;
    color: #174ea6;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .question {
    font-size: 1.3em;
    font-weight: 600;
    color: #174ea6;
    margin-bottom: 20px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
  }

  .choice {
    background: #e8ecf8;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-size: 1.05em;
  }

  .choice:hover { background: #d3dbf8; }
  .choice.selected { background: #174ea6; color: #fff; }

  .explanation {
    background: #eef3ff;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 10px;
    display: none;
    text-align: left;
    font-size: 1.05em;
  }

  .next-btn {
    background: #136f63;
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 10px;
    font-size: 1.05em;
    cursor: pointer;
    font-weight: bold;
    margin-top: 15px;
  }

  .next-btn:hover { background: #0f5b52; }

  .result {
    font-size: 1.4em;
    font-weight: bold;
    color: #174ea6;
    margin-top: 20px;
  }

  .stars {
    font-size: 2.5em;
    margin-top: 10px;
  }

  .quiz-nav {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .quiz-btn {
    background: #e8ecf8;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.95em;
    cursor: pointer;
  }

  .quiz-btn.primary {
    background: #136f63;
    color: #fff;
  }

  .quiz-btn.primary:hover { background: #0f5b52; }
</style>
</head>

<body>
<div class="quiz-container">
  <h2>Lesson 2 Quiz – Cis–Trans and E–Z Isomerism</h2>

  <div class="progress-text" id="progressText"></div>
  <div class="progress-wrapper">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quizBox"></div>
  <button id="nextBtn" class="next-btn" style="display:none;">Next</button>
</div>

<script>
const quizData = [
  {
    q: "1. Why can alkenes exhibit cis–trans isomerism?",
    c: [
      "Because single bonds rotate freely",
      "Because double bonds restrict rotation",
      "Because carbon forms four bonds",
      "Because π bonds are weaker than σ bonds"
    ],
    a: 1,
    e: "The π bond in a C=C double bond prevents free rotation, locking groups in fixed positions."
  },
  {
    q: "2. Which condition must be met for cis–trans isomerism to be possible?",
    c: [
      "Both carbons must be identical",
      "At least one carbon must have two identical groups",
      "Each double-bonded carbon must have two different groups",
      "The molecule must be cyclic"
    ],
    a: 2,
    e: "Each carbon in the double bond must have two different substituents for cis–trans isomerism."
  },
  {
    q: "3. Why is cis–trans naming not always sufficient?",
    c: [
      "It ignores molecular mass",
      "It cannot describe four different substituents",
      "It violates the octet rule",
      "It applies only to cycloalkanes"
    ],
    a: 1,
    e: "When all four groups are different, cis–trans becomes ambiguous and E–Z naming is required."
  },
  {
    q: "4. What does the letter Z represent in E–Z nomenclature?",
    c: [
      "Opposite sides",
      "Lower priority groups",
      "Higher priority groups on the same side",
      "Identical substituents"
    ],
    a: 2,
    e: "Z (zusammen) means the higher-priority substituents are on the same side of the double bond."
  },
  {
    q: "5. Which atom has the highest priority under CIP rules?",
    c: [
      "Carbon",
      "Hydrogen",
      "Oxygen",
      "Nitrogen"
    ],
    a: 2,
    e: "Priority is based on atomic number. Oxygen (8) outranks nitrogen (7), carbon (6), and hydrogen (1)."
  },
  {
    q: "6. In E–Z nomenclature, how are priorities determined?",
    c: [
      "By molecular mass",
      "By number of bonds",
      "By atomic number",
      "By bond angle"
    ],
    a: 2,
    e: "CIP rules assign priority based on atomic number, not mass or bond count."
  },
  {
    q: "7. What does the letter E represent?",
    c: [
      "Higher-priority groups on opposite sides",
      "Identical groups on the same side",
      "Equal bond lengths",
      "Electron movement"
    ],
    a: 0,
    e: "E (entgegen) means the higher-priority groups are on opposite sides of the double bond."
  },
  {
    q: "8. Which statement about cis and trans is correct?",
    c: [
      "They differ in molecular formula",
      "They differ in connectivity",
      "They differ in spatial arrangement",
      "They differ in number of atoms"
    ],
    a: 2,
    e: "Cis–trans isomers have the same formula and connectivity but different spatial arrangement."
  },
  {
    q: "9. Which bond is responsible for restricted rotation?",
    c: [
      "σ bond",
      "π bond",
      "Hydrogen bond",
      "Ionic bond"
    ],
    a: 1,
    e: "The π bond prevents rotation around the double bond axis."
  },
  {
    q: "10. Which naming system works for all alkenes?",
    c: [
      "Cis–trans only",
      "Common naming",
      "E–Z system",
      "Cyclo naming"
    ],
    a: 2,
    e: "The E–Z system is universal and applies to all alkenes regardless of substituent complexity."
  }
];

let current = 0, score = 0, selected = null, showingExplanation = false;
const quizBox = document.getElementById("quizBox");
const nextBtn = document.getElementById("nextBtn");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

function showQuestion() {
  const q = quizData[current];
  updateProgress();
  quizBox.innerHTML = `
    <div class='question'>${q.q}</div>
    <div class='choices'></div>
    <div class='explanation' id='explanationBox'></div>
  `;
  const choicesContainer = quizBox.querySelector(".choices");
  q.c.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = choice;
    btn.addEventListener("click", () => selectChoice(i));
    choicesContainer.appendChild(btn);
  });
  nextBtn.style.display = "none";
  selected = null;
  showingExplanation = false;
}

function selectChoice(i) {
  if (showingExplanation) return;
  selected = i;
  document.querySelectorAll(".choice").forEach((btn, idx) => {
    btn.classList.toggle("selected", idx === i);
    btn.disabled = true;
  });
  const q = quizData[current];
  const expBox = document.getElementById("explanationBox");
  const correct = i === q.a;

  if (correct) score++;

  expBox.innerHTML = `<strong>${correct ? "✅ Correct!" : "❌ Incorrect."}</strong><br>${q.e}`;
  expBox.style.display = "block";
  nextBtn.style.display = "inline-block";
  showingExplanation = true;
}

nextBtn.addEventListener("click", () => {
  current++;
  if (current < quizData.length) showQuestion();
  else showResult();
});

function updateProgress() {
  const percent = (current / quizData.length) * 100;
  progressBar.style.width = percent + "%";
  progressText.textContent = `Question ${current + 1} of ${quizData.length}`;
}

function getStarRating(percent) {
  if (percent === 100) return "⭐️⭐️⭐️";
  else if (percent >= 90) return "⭐️⭐️☆";
  else if (percent >= 80) return "⭐️☆☆";
  else return "☆☆☆";
}

let resultSent = false;

function showResult() {
  progressBar.style.width = "100%";
  progressText.textContent = "Quiz Completed";

  const percent = Math.round((score / quizData.length) * 100);
  const passed = percent >= 80;

  quizBox.innerHTML = `
    <div class='stars'>${getStarRating(percent)}</div>
    <div class='result'>You scored ${score}/${quizData.length} (${percent}%)</div>
    <p id="saveStatus" style="color:#174ea6;font-weight:600;margin-top:10px;">Saving progress...</p>
    <div class='quiz-nav'>
      <button class='quiz-btn' id='backBtn' disabled>⬅ Back</button>
      <button class='quiz-btn' id='retryBtn' disabled>🔁 Retry</button>
      <button class='quiz-btn primary' id='nextLessonBtn' disabled>➡ Next Lesson</button>
    </div>
  `;

  nextBtn.style.display = "none";

  if (!resultSent) {
    resultSent = true;
    window.parent.postMessage({ type: "quizResult", score: percent, passed }, "*");
  }

  setTimeout(() => {
    const status = document.getElementById("saveStatus");
    const backBtn = document.getElementById("backBtn");
    const retryBtn = document.getElementById("retryBtn");
    const nextLessonBtn = document.getElementById("nextLessonBtn");

    if (status) status.textContent = passed
      ? "Progress sent. You may proceed after it is saved."
      : "Attempt recorded. Retake the quiz to unlock the next lesson.";

    if (backBtn) backBtn.disabled = false;
    if (retryBtn) retryBtn.disabled = false;
    if (nextLessonBtn) nextLessonBtn.disabled = !passed;

    if (retryBtn) retryBtn.addEventListener("click", retryQuiz);
    if (backBtn) backBtn.addEventListener("click", () =>
      window.parent.postMessage({ type: "quizBack" }, "*")
    );
    if (nextLessonBtn) nextLessonBtn.addEventListener("click", () => {
      if (passed) window.parent.postMessage({ type: "quizNextLesson" }, "*");
    });
  }, 1200);
}

function retryQuiz() {
  resultSent = false;
  current = 0;
  score = 0;
  showQuestion();
}

showQuestion();
</script>
</body>
</html>
