<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chapter 4 – Lesson 2 Quiz: Alkyl Groups</title>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e8f9f1, #f7faff);
    margin: 0;
    padding: 40px 20px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .quiz-container {
    background: #ffffff;
    border-radius: 18px;
    padding: 40px 50px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    width: 95%;
    max-width: 850px;
    text-align: center;
  }

  h2 {
    color: #136f63;
    margin-bottom: 25px;
    font-size: 1.8em;
  }

  .progress-wrapper {
    background: #e9f5ef;
    border-radius: 8px;
    height: 14px;
    width: 100%;
    margin-bottom: 25px;
    overflow: hidden;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.1);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, #136f63, #2b7de9);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 8px;
  }

  .progress-text {
    text-align: right;
    font-size: 0.95em;
    color: #174ea6;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .question {
    font-size: 1.3em;
    font-weight: 600;
    color: #174ea6;
    margin-bottom: 20px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
  }

  .choice {
    background: #e8ecf8;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-size: 1.05em;
    transition: all 0.2s ease;
  }
  .choice:hover { background: #d3dbf8; transform: translateY(-2px); }
  .choice.selected { background: #174ea6; color: #fff; }

  .explanation {
    background: #eef3ff;
    border-radius: 10px;
    padding: 14px 18px;
    display: none;
    margin-top: 10px;
    text-align: left;
  }

  .next-btn {
    background: #136f63;
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 10px;
    font-size: 1.05em;
    cursor: pointer;
    font-weight: bold;
    display: none;
    transition: 0.2s;
  }
  .next-btn:hover { background: #0f5b52; }

  .result { font-size: 1.4em; font-weight: bold; color:#174ea6; margin-top:20px; }
  .stars { font-size: 2.5em; margin-top: 10px; }

  .quiz-nav {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .quiz-btn {
    background: #e8ecf8;
    color: #174ea6;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.95em;
    cursor: pointer;
    transition: 0.2s;
  }
  .quiz-btn:hover { background: #d3dbf8; transform: translateY(-2px); }
  .quiz-btn.primary { background:#136f63; color:#fff; }
  .quiz-btn.primary:hover { background:#0f5b52; }
</style>
</head>

<body>
<div class="quiz-container">
  <h2>Lesson 2 Quiz – Alkyl Groups</h2>

  <div class="progress-text" id="progressText">Question 1 of 10</div>
  <div class="progress-wrapper"><div class="progress-bar" id="progressBar"></div></div>

  <div id="quizBox"></div>
  <button id="nextBtn" class="next-btn">Next</button>
</div>

<script>
const quizData = [
  {
    q: "1. What is an alkyl group?",
    c: [
      "An alkane with all hydrogens present",
      "An alkane that lost one hydrogen atom",
      "A molecule containing oxygen",
      "A molecule with a double bond"
    ],
    a: 1,
    e: "An alkyl group forms when an alkane loses one H, creating a point of attachment (–R)."
  },
  {
    q: "2. Which of the following is a methyl group?",
    c: ["CH₃–", "CH₃CH₂–", "CH₃CH₂CH₂–", "(CH₃)₂CH–"],
    a: 0,
    e: "CH₃– is the methyl group (derived from methane)."
  },
  {
    q: "3. Which alkyl group comes from ethane?",
    c: ["Methyl", "Ethyl", "Propyl", "Isopropyl"],
    a: 1,
    e: "Removing one H from ethane (CH₃–CH₃) produces the ethyl group (CH₃CH₂–)."
  },
  {
    q: "4. Which structure represents isopropyl?",
    c: [
      "CH₃–",
      "CH₃CH₂–",
      "(CH₃)₂CH–",
      "(CH₃)₃C–"
    ],
    a: 2,
    e: "Isopropyl has the structure (CH₃)₂CH–."
  },
  {
    q: "5. What branched alkyl group is (CH₃)₃C– ?",
    c: ["Isobutyl", "sec-Butyl", "tert-Butyl", "Isopropyl"],
    a: 2,
    e: "(CH₃)₃C– is tert-butyl, where a central carbon is bonded to three CH₃ groups."
  },
  {
    q: "6. Which alkyl group is represented in skeletal form by a short line branching off a main chain?",
    c: ["A halogen", "An alkyl group", "A double bond", "A lone pair"],
    a: 1,
    e: "A branch in skeletal structures represents an alkyl substituent."
  },
  {
    q: "7. The group CH₃CH₂CH₂CH₂– is called:",
    c: ["Butyl", "Propyl", "Pentyl", "sec-Butyl"],
    a: 0,
    e: "Four carbons = butane → butyl as an alkyl group."
  },
  {
    q: "8. Which is TRUE about alkyl groups?",
    c: [
      "They contain at least one double bond.",
      "They always contain oxygen.",
      "They are formed by removing one H from an alkane.",
      "They can replace carbon atoms in a chain."
    ],
    a: 2,
    e: "Alkyl groups are simply alkanes missing one hydrogen."
  },
  {
    q: "9. Which alkyl group is attached at a secondary carbon?",
    c: ["Isopropyl", "tert-Butyl", "Methyl", "n-Butyl"],
    a: 0,
    e: "Isopropyl attaches via a secondary (2°) carbon."
  },
  {
    q: "10. A skeletal structure shows a branch shaped like a 'Y'. Which alkyl group most likely fits?",
    c: ["Isopropyl", "Ethyl", "n-Butyl", "sec-Butyl"],
    a: 0,
    e: "Isopropyl often shows as a 'Y' shape due to two CH₃ groups on one carbon."
  }
];

let current = 0, score = 0, selected = null, showingExplanation = false;
const quizBox = document.getElementById("quizBox");
const nextBtn = document.getElementById("nextBtn");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

function showQuestion() {
  const q = quizData[current];
  updateProgress();
  quizBox.innerHTML = `
    <div class='question'>${q.q}</div>
    <div class='choices'></div>
    <div class='explanation' id='explanationBox'></div>
  `;
  const choicesContainer = quizBox.querySelector(".choices");
  q.c.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = choice;
    btn.addEventListener("click", () => selectChoice(i));
    choicesContainer.appendChild(btn);
  });
  nextBtn.style.display = "none";
  selected = null;
  showingExplanation = false;
}

function selectChoice(i) {
  if (showingExplanation) return;
  selected = i;
  document.querySelectorAll(".choice").forEach((btn, idx) => {
    btn.classList.toggle("selected", idx === i);
    btn.disabled = true;
  });
  const q = quizData[current];
  const expBox = document.getElementById("explanationBox");
  const correct = i === q.a;

  if (correct) score++;

  expBox.innerHTML = `<strong>${correct ? "✅ Correct!" : "❌ Incorrect."}</strong><br>${q.e}`;
  expBox.style.display = "block";
  nextBtn.style.display = "inline-block";
  showingExplanation = true;
}

nextBtn.addEventListener("click", () => {
  current++;
  if (current < quizData.length) showQuestion();
  else showResult();
});

function updateProgress() {
  const percent = (current / quizData.length) * 100;
  progressBar.style.width = percent + "%";
  progressText.textContent = `Question ${current + 1} of ${quizData.length}`;
}

function getStarRating(percent) {
  if (percent === 100) return "⭐️⭐️⭐️";
  else if (percent >= 90) return "⭐️⭐️☆";
  else if (percent >= 80) return "⭐️☆☆";
  else return "☆☆☆";
}

let resultSent = false;

function showResult() {
  progressBar.style.width = "100%";
  progressText.textContent = "Quiz Completed";

  const percent = Math.round((score / quizData.length) * 100);
  const passed = percent >= 80;

  quizBox.innerHTML = `
    <div class='stars'>${getStarRating(percent)}</div>
    <div class='result'>You scored ${score}/${quizData.length} (${percent}%)</div>
    <p id="saveStatus" style="color:#174ea6;font-weight:600;margin-top:10px;">Saving progress...</p>
    <div class='quiz-nav'>
      <button class='quiz-btn' id='backBtn' disabled>⬅ Back</button>
      <button class='quiz-btn' id='retryBtn' disabled>🔁 Retry</button>
      <button class='quiz-btn primary' id='nextLessonBtn' disabled>➡ Next Lesson</button>
    </div>
  `;

  nextBtn.style.display = "none";

  if (!resultSent) {
    resultSent = true;
    window.parent.postMessage({ type: "quizResult", score: percent, passed }, "*");
  }

  setTimeout(() => {
    const status = document.getElementById("saveStatus");
    const backBtn = document.getElementById("backBtn");
    const retryBtn = document.getElementById("retryBtn");
    const nextLessonBtn = document.getElementById("nextLessonBtn");

    if (status) status.textContent = passed
      ? "Progress sent. You may proceed after it is saved."
      : "Attempt recorded. Retake the quiz to unlock the next lesson.";

    if (backBtn) backBtn.disabled = false;
    if (retryBtn) retryBtn.disabled = false;
    if (nextLessonBtn) nextLessonBtn.disabled = !passed;

    if (retryBtn) retryBtn.addEventListener("click", retryQuiz);
    if (backBtn) backBtn.addEventListener("click", () =>
      window.parent.postMessage({ type: "quizBack" }, "*")
    );
    if (nextLessonBtn) nextLessonBtn.addEventListener("click", () => {
      if (passed) window.parent.postMessage({ type: "quizNextLesson" }, "*");
    });
  }, 1200);
}

function retryQuiz() {
  resultSent = false;
  current = 0;
  score = 0;
  showQuestion();
}

showQuestion();
</script>

</body>
</html>
